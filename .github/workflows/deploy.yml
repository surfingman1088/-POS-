name: 部署到 VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: '執行動作'
        required: true
        default: 'upgrade'
        type: choice
        options:
          - upgrade
          - status

jobs:
  deploy:
    name: 部署 YO 團購 POS 系統
    runs-on: ubuntu-latest

    steps:
      - name: 取得代碼
        uses: actions/checkout@v4

      - name: 設定 SSH 金鑰
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 加入 VPS 到已知主機
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 執行升級腳本
        if: ${{ github.event.inputs.action != 'status' }}
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            cd /opt/yo-pos-source && \
            git fetch origin && \
            git reset --hard origin/main && \
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction && \
            npm install && npm run build && \
            for BRANCH in bade sanxia dazhu linkou yiwen guolin; do
              APP_DIR=/var/www/pos-\$BRANCH
              if [ -d \$APP_DIR ]; then
                rsync -a --exclude='.env' --exclude='storage/' /opt/yo-pos-source/ \$APP_DIR/
                cd \$APP_DIR
                php artisan migrate --force
                php artisan config:cache
                php artisan route:cache
                php artisan view:cache
                echo \"✓ \$BRANCH 更新完成\"
              fi
            done
            PHP_VER=\$(php -r \"echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;\")
            systemctl restart php\${PHP_VER}-fpm
            nginx -t && systemctl reload nginx
            echo '🎉 所有分店更新完成！'
          "

      - name: 檢查系統狀態
        run: |
          ssh root@${{ secrets.VPS_HOST }} "bash /opt/yo-pos-source/scripts/status.sh"
